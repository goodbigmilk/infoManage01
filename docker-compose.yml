services:
  mysql:
    image: mysql:8.0
    container_name: infomanage-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootmysql}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-infoManage}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootmysql}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infomanage-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9901}:9901"
    environment:
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootmysql}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-infoManage}
      PORT: "9901"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
